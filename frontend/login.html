<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickQnnect Login</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
:root {
  --green: #1a9e75;
  --surface: #f7faf8;
  --border: rgba(15,26,20,0.1);
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* BACKGROUND */
.bg-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* BLOBS */
.blob {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.8;
  mix-blend-mode: multiply;
}

/* DIFFERENT COLORS */
#b1 {
  background: radial-gradient(circle, #22c55e, transparent 70%);
  top: -10%;
  left: -10%;
}

#b2 {
  background: radial-gradient(circle, #0ea5e9, transparent 70%);
  bottom: -10%;
  right: -10%;
}

#b3 {
  background: radial-gradient(circle, #a855f7, transparent 70%);
  top: 40%;
  left: 30%;
}

.bg-animation::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.05));
}

/* MAIN WRAPPER */
.wrapper {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}

/* LEFT */
.left {
  background: var(--green);
  color: white;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.left h1 {
  font-size: 36px;
}

.left p {
  font-size: 14px;
  opacity: 0.9;
}

/* RIGHT */
.right {
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.right h2 {
  margin-bottom: 20px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

/* BUTTON */
button {
  padding: 12px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* TOGGLE */
.toggle {
  margin-top: 12px;
  text-align: center;
  color: var(--green);
  cursor: pointer;
}

/* MOBILE */
@media(max-width: 700px) {
  .wrapper {
    grid-template-columns: 1fr;
  }
  .left {
    display: none;
  }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-animation">
  <div class="blob" id="b1"></div>
  <div class="blob" id="b2"></div>
  <div class="blob" id="b3"></div>
</div>

<!-- LOGIN CARD -->
<div class="wrapper" id="card">

  <div class="left">
    <h1>QuickQnnect 🎓</h1>
    <p>Connect with students nearby and get things done.</p>
  </div>

  <div class="right">
    <h2 id="title">Welcome Back</h2>

    <input id="name" placeholder="Your Name" style="display:none;">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <select id="college" style="display:none;">
      <option value="">Select college</option>
      <option>SFIT</option>
      <option>DJ Sanghvi</option>
    </select>

    <button onclick="login()">Continue</button>

    <div class="toggle" onclick="toggleMode()">
      New here? Create account
    </div>
  </div>

</div>

<script>
let isLogin = true;

/* 🔥 BACKGROUND ANIMATION (VISIBLE NOW) */
gsap.to("#b1", {
  x: 400,
  y: 200,
  duration: 10,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});

gsap.to("#b2", {
  x: -300,
  y: -250,
  duration: 12,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});

gsap.to("#b3", {
  x: 250,
  y: -200,
  duration: 11,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});

/* 🔥 CARD ENTRY ANIMATION */
gsap.from("#card", {
  opacity: 0,
  y: 50,
  duration: 0.6,
  ease: "power2.out"
});

function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText =
    isLogin ? "Welcome Back" : "Create Account";

  document.getElementById("name").style.display =
    isLogin ? "none" : "block";

  document.getElementById("college").style.display =
    isLogin ? "none" : "block";
}

async function login() {
  const name = document.getElementById("name").value;
  const college = document.getElementById("college").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  let url = isLogin
    ? "https://quickqnnect-backend.onrender.com/api/auth/login"
    : "https://quickqnnect-backend.onrender.com/api/auth/register";

  const body = isLogin
    ? { email, password }
    : { name, college, email, password };

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.msg || "Error");
      return;
    }

    // ✅ store user
    localStorage.setItem("qq_user", JSON.stringify(data));

    window.location.href = "index.html";

  } catch (err) {
    alert("Server error");
  }
}

const existing = localStorage.getItem("qq_user");
if (existing) {
  window.location.href = "index.html";
}
</script>

</body>
</html>
